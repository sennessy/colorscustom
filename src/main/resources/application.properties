spring.application.name=colorscustom

# Base URL (for absolute links if needed in future)
app.baseUrl=${APP_BASE_URL:http://localhost:8080}

# Server
server.port=${PORT:${SERVER_PORT:8080}}

# Performance: compression + cache static resources
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml,image/svg+xml

spring.web.resources.cache.cachecontrol.cache-public=true
spring.web.resources.cache.cachecontrol.max-age=365d
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**

# Actuator: expose only /actuator/health
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
