<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<!-- HEADER -->
<div th:replace="fragments/header :: fragment"></div>

<!-- HERO CONTACT -->
<section class="contact-hero">

    <h1 class="contact-hero-title">CONTACT</h1>

    <button class="contact-hero-btn" onclick="scrollToContactForm()">
        Découvrir
    </button>

    <img src="/img/placeholder-service.jpg" class="contact-hero-image" alt="Contact">
</section>

<!-- CONTACT FORM SECTION -->
<section id="contact-form-section" class="contact-section">

    <h2>Nous contacter</h2>

    <p class="contact-subtitle">
        Une question, un projet, une demande de devis ?  
        Notre équipe vous répond rapidement.
    </p>

    <form class="contact-form">

        <div class="form-group">
            <label>Nom complet</label>
            <input type="text" placeholder="Votre nom" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="Votre email" required>
        </div>

        <div class="form-group">
            <label>Téléphone</label>
            <input type="text" placeholder="Votre numéro">
        </div>

        <div class="form-group">
            <label>Message</label>
            <textarea placeholder="Votre message" required></textarea>
        </div>

        <button type="submit" class="contact-submit">Envoyer</button>

    </form>

    <!-- CONTACT INFO -->
    <div class="contact-info">

        <h3>Informations</h3>

        <p>Route des Avouillons 17C<br>1196 Gland, Suisse</p>

        <p><a href="mailto:contact@colorscustom.ch">contact@colorscustom.ch</a></p>

        <p><a href="tel:+41212113600">+41 021 211 36 00</a></p>

    </div>

</section>

<script src="/js/contact.js"></script>

</body>
</html>
