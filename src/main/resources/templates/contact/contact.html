<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CONTACT | COLORS CUSTOM</title>
  <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
  <div th:replace="~{fragments/header :: fragment('contact')}"></div>

  <main class="page-shell">
    <section>
      <span class="page-kicker">CONTACT</span>
      <h1>CONTACT</h1>
      <p>Votre projet commence ici.</p>
      <p>Chaque véhicule est différent. Dites-nous ce que vous avez en tête, on s'occupe du reste.</p>
    </section>

    <section>
      <h2>COORDONNÉES</h2>
      <div class="list-grid">
        <article class="list-card"><h3>ADRESSE</h3><p>Route des Avouillons 17C, 1196 Gland, Suisse</p></article>
        <article class="list-card"><h3>TELEPHONE</h3><p><a href="tel:+41212113600">+41 21 211 36 00</a></p></article>
        <article class="list-card"><h3>EMAIL</h3><p><a href="mailto:contact@colorscustom.ch">contact@colorscustom.ch</a></p></article>
      </div>
    </section>

    <section>
      <h2>DEMANDE RAPIDE</h2>
      <form action="#" method="post" class="inline-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <input type="text" name="name" placeholder="Nom" />
        <input type="email" name="email" placeholder="Email" />
        <textarea name="message" rows="5" placeholder="Message"></textarea>
        <button type="button" disabled>Envoyer (bientôt)</button>
      </form>
    </section>
  </main>

  <div th:replace="~{fragments/footer :: fragment}"></div>
</body>
</html>
