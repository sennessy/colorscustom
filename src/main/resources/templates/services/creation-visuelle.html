<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SERVICE | CRÉATION VISUELLE | COLORS CUSTOM</title>
  <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
  <div th:replace="~{fragments/header :: fragment('services')}"></div>
  <main class="page-shell">
    <section>
      <span class="page-kicker">SERVICE</span>
      <h1>CRÉATION VISUELLE</h1>
      <img src="/img/placeholder-service.svg" alt="Création visuelle" class="mono-hero" />
      <p>Stickers, logos, lettrages et bandes décoratives pour un rendu unique.</p>
    </section>
    <section>
      <h2>ÉLÉMENTS PROPOSÉS</h2>
      <div class="list-grid">
        <article class="list-card"><h3>LOGOS</h3><p>Identite visuelle adaptée au support.</p></article>
        <article class="list-card"><h3>BANDES</h3><p>Accent graphique et style personnalisé.</p></article>
        <article class="list-card"><h3>MARQUAGES</h3><p>Exécution précise et durable.</p></article>
      </div>
      <p><a th:href="@{/services/creation-visuelle-long}">Voir la version détaillée</a></p>
    </section>
    <div th:replace="~{fragments/prefooter :: fragment}"></div>
  </main>
  <div th:replace="~{fragments/footer :: fragment}"></div>
</body>
</html>
