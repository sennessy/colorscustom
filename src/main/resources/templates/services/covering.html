<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SERVICE | COVERING | COLORS CUSTOM</title>
  <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
  <div th:replace="~{fragments/header :: fragment('services')}"></div>
  <main class="page-shell">
    <section>
      <span class="page-kicker">SERVICE</span>
      <h1>COVERING</h1>
      <img src="/img/placeholder-service.svg" alt="Covering" class="mono-hero" />
      <p>Ajoutez un style audacieux sans compromis sur la protection de la peinture.</p>
    </section>
    <section>
      <h2>POINTS CLES</h2>
      <div class="list-grid">
        <article class="list-card"><h3>STYLE</h3><p>Transformation visuelle nette et maitrisee.</p></article>
        <article class="list-card"><h3>PROTECTION</h3><p>Barrière supplémentaire contre l'usure quotidienne.</p></article>
        <article class="list-card"><h3>FINITION</h3><p>Pose precise et contrôlée.</p></article>
      </div>
    </section>
    <div th:replace="~{fragments/prefooter :: fragment}"></div>
  </main>
  <div th:replace="~{fragments/footer :: fragment}"></div>
</body>
</html>
