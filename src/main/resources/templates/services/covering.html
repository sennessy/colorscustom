<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SERVICE | COVERING | COLORS CUSTOM</title>
  <link rel="stylesheet" th:href="@{/css/style.css}" />
  <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
  <meta name="googlebot" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
  <meta property="og:site_name" content="COLORS CUSTOM" />
  <meta property="og:locale" content="fr_CH" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="alternate" type="text/plain" href="/llms.txt" title="Colors Custom LLMs" />
</head>
<body>
  <div th:replace="~{fragments/header :: fragment('services')}"></div>
  <main class="page-shell">
    <section>
      <span class="page-kicker">SERVICE</span>
      <h1>COVERING</h1>
      <img src="/img/covering-9872.webp" alt="Covering" class="mono-hero" />
      <p>Ajoutez un style audacieux sans compromis sur la protection de la peinture.</p>
      <p class="service-price service-price--quote">Tarif sur demande</p>
    </section>
    <section>
      <h2>POINTS CLÉS</h2>
      <div class="list-grid">
        <article class="list-card"><h3>STYLE</h3><p>Transformation visuelle nette et maîtrisée.</p></article>
        <article class="list-card"><h3>PROTECTION</h3><p>Barrière supplémentaire contre l'usure quotidienne.</p></article>
        <article class="list-card"><h3>FINITION</h3><p>Pose précise et contrôlée.</p></article>
      </div>
    </section>
    <div th:replace="~{fragments/prefooter :: fragment}"></div>
  </main>
  <div th:replace="~{fragments/footer :: fragment}"></div>
</body>
</html>
