<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SERVICE | FEUX TEINTÉS | COLORS CUSTOM</title>
  <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
  <div th:replace="~{fragments/header :: fragment('services')}"></div>
  <main class="page-shell">
    <section>
      <span class="page-kicker">SERVICE</span>
      <h1>FEUX TEINTÉS</h1>
      <img src="/img/placeholder-service.svg" alt="Feux teintés" class="mono-hero" />

    </section>
    <section>
      <h2>RÉSULTAT ATTENDU</h2>
      <div class="list-grid">

        <article class="list-card"><h3>APPLICATION PRÉCISE</h3><p>Niveau de teinte ajusté au besoin.</p></article>
        <article class="list-card"><h3>FINITIONS PROPRES</h3><p>Contrôle final avant livraison.</p></article>

    <div th:replace="~{fragments/prefooter :: fragment}"></div>

  <div th:replace="~{fragments/footer :: fragment}"></div>

</html>
