<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SERVICE | REVÊTEMENT CÉRAMIQUE | COLORS CUSTOM</title>
  <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
  <div th:replace="~{fragments/header :: fragment('services')}"></div>
  <main class="page-shell">
    <section>
      <span class="page-kicker">SERVICE</span>
      <h1>REVÊTEMENT CÉRAMIQUE</h1>
      <img src="/img/placeholder-service.svg" alt="Revêtement céramique" class="mono-hero" />
      <p>Protection hydrophobe pour conserver l'éclat et simplifier l'entretien.</p>
    </section>
    <section>
      <h2>BÉNÉFICES</h2>
      <div class="list-grid">
        <article class="list-card"><h3>EFFET DÉPERLANT</h3><p>L'eau et les contaminants adhèrent moins.</p></article>
        <article class="list-card"><h3>BRILLANCE</h3><p>Rendu visuel net et durable.</p></article>
        <article class="list-card"><h3>ENTRETIEN</h3><p>Nettoyage plus rapide au quotidien.</p></article>
      </div>
      <p><a th:href="@{/services/ceramique-long}">Voir la version détaillée</a></p>
    </section>
    <div th:replace="~{fragments/prefooter :: fragment}"></div>
  </main>
  <div th:replace="~{fragments/footer :: fragment}"></div>
</body>
</html>
