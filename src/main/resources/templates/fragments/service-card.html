<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div class="service-card" th:fragment="fragment(title, description, link)">
  <img src="/img/placeholder-service.svg" alt="Service" class="service-card__img" />
  <h3 class="service-card__title" th:text="${title}">Titre</h3>
  <p class="service-card__desc" th:text="${description}">Description</p>
  <a class="service-card__link" th:href="@{${link}}">En savoir plus</a>
</div>

</body>
</html>
