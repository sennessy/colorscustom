<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<body>
<div class="b2-card" th:fragment="fragment(title, link)">
  <img src="/img/placeholder-b2.svg" alt="B2 segment" class="b2-image" />
  <div class="b2-content">
    <h2 class="b2-title" th:text="${title}">Prives</h2>
    <a th:href="@{${link}}" class="b2-cta">Découvrez nos services</a>
    <p class="b2-subcta">Votre projet en un clic</p>
  </div>
</div>
</body>
</html>
