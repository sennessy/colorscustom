<article class="faq-item" th:fragment="fragment(question, answer)">
  <button class="faq-question" type="button" aria-expanded="false">
    <span class="faq-question__text" th:text="${question}">Question</span>
    <span class="faq-question__icon" aria-hidden="true"></span>
  </button>
  <div class="faq-answer" hidden>
    <p th:text="${answer}">Réponse</p>
  </div>
</article>
