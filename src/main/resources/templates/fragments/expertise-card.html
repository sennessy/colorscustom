<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<body>
<div class="expertise-card" th:fragment="fragment(title, link)">
  <img src="/img/placeholder-expertise.svg" alt="Image expertise" class="expertise-image" />
  <div class="expertise-content">
    <h2 class="expertise-title" th:text="${title}">Expertise</h2>
    <a th:href="@{${link}}" class="expertise-cta">Découvrez nos services</a>
  </div>
</div>
</body>
</html>
