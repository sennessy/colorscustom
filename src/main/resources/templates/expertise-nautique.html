<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>

  <title>EXPERTISE | NAUTIQUE | COLORS CUSTOM</title>
  <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
  <div th:replace="~{fragments/header :: fragment('services')}"></div>
  <main class="page-shell">

      <h1>NAUTIQUE</h1>

    <section>

        <article class="list-card"><h3>PROTECTION SURFACE</h3><p>Barrière contre agressions extérieures.</p></article>

  </main>
  <div th:replace="~{fragments/footer :: fragment}"></div>

</html>
